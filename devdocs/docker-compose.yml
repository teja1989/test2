version: '3.9'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health | grep -qv "\"status\":\"red\""']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    ports:
      - '5601:5601'
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - kibana

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./packages/backend:/app
      - backend_modules:/app/node_modules
      - repos_data:/repos
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - ES_NODE=http://elasticsearch:9200
      - ES_INDEX=${ES_INDEX:-devdocs}
      - DOCS_BASE_PATH=/repos
      - PORT=3001
    env_file:
      - .env
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./packages/frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE=http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  es_data:
  repos_data:
  backend_modules:
  frontend_modules:
