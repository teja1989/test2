version: '3.9'

services:
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./packages/backend:/app
      - backend_modules:/app/node_modules
      - repos_data:/repos
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - DOCS_BASE_PATH=/repos
      - PORT=3001
    env_file:
      - .env
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./packages/frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE=http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  repos_data:
  backend_modules:
  frontend_modules:
